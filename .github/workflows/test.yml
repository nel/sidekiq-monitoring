name: Test

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        ruby: ['3.1', '3.2', '3.3', '3.4', '4.0']
        sidekiq: ['6', '7', '8', 'edge']
        sinatra: ['3', '4', 'edge']
    env:
      SIDEKIQ_VERSION: ${{ matrix.sidekiq }}
      SINATRA_VERSION: ${{ matrix.sinatra }}
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true
      - run: bundle exec rspec
