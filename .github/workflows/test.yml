name: Test

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        ruby: ['3.1', '3.2', '3.3', '3.4', '4.0']
        sidekiq: ['5', '6', '7', '8', 'edge']
        sinatra: ['3', '4', 'edge']
        exclude:
          - ruby: '3.1'
            sidekiq: '8'
          - ruby: '3.1'
            sidekiq: 'edge'
          - sidekiq: '8'
            sinatra: '3'
          - sidekiq: 'edge'
            sinatra: '3'
          - ruby: '4.0'
            sinatra: '3'
          - sidekiq: '5'
            sinatra: '4'
          - sidekiq: '5'
            sinatra: 'edge'
          - ruby: '4.0'
            sidekiq: '5'
    env:
      SIDEKIQ_VERSION: ${{ matrix.sidekiq }}
      SINATRA_VERSION: ${{ matrix.sinatra }}
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true
      - run: bundle exec rspec
